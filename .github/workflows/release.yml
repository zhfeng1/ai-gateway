name: Release Packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: ai-gateway-macos
            executable_path: AI Gateway.app/Contents/MacOS/AI Gateway
            archive_name: ai-gateway-macos.zip
            app_name: AI Gateway
          - os: windows-latest
            artifact_name: ai-gateway-windows-x64
            executable_path: ai-gateway.exe
            archive_name: ai-gateway-windows-x64.zip
            entry_point: desktop_launcher.py
            app_name: ai-gateway
            windowed: "--windowed"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements-release.txt

      - name: Build Windows executable
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --clean
          --noconfirm
          --name "${{ matrix.app_name }}"
          ${{ matrix.windowed }}
          --collect-all uvicorn
          --collect-all websockets
          --collect-all httptools
          --collect-all watchfiles
          --collect-all anyio
          --collect-all httpx
          --collect-all webview
          "${{ matrix.entry_point }}"

      - name: Build macOS backend
        if: runner.os == 'macOS'
        run: >
          pyinstaller
          --clean
          --noconfirm
          --name ai-gateway-backend
          --collect-all uvicorn
          --collect-all websockets
          --collect-all httptools
          --collect-all watchfiles
          --collect-all anyio
          --collect-all httpx
          launcher.py

      - name: Build macOS app wrapper
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_DIR="dist/AI Gateway.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources/backend"
          xcrun swiftc \
            -O \
            -framework Cocoa \
            -framework WebKit \
            -o "$APP_DIR/Contents/MacOS/AI Gateway" \
            "macos/AI Gateway/App.swift"
          cp -R "dist/ai-gateway-backend/." "$APP_DIR/Contents/Resources/backend/"
          cp "macos/AI Gateway/Info.plist" "$APP_DIR/Contents/Info.plist"
          cp -R "macos/AI Gateway/"*.lproj "$APP_DIR/Contents/Resources/"
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+([.][0-9]+){0,2}$ ]]; then
            VERSION="0.1.0"
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$APP_DIR/Contents/Info.plist"
          ICONSET="$RUNNER_TEMP/AppIcon.iconset"
          mkdir -p "$ICONSET"
          python - <<'PY'
          import math
          import struct
          import zlib
          from pathlib import Path

          size = 1024
          rows = []
          for y in range(size):
              row = bytearray([0])
              for x in range(size):
                  dx = (x - size / 2) / (size / 2)
                  dy = (y - size / 2) / (size / 2)
                  dist = min(1.0, math.sqrt(dx * dx + dy * dy))
                  r = int(11 + 28 * (1 - dist))
                  g = int(18 + 122 * (1 - dist) + 36 * (x / size))
                  b = int(32 + 88 * (1 - dist) + 34 * (y / size))
                  a = 255
                  if abs(dx) < 0.34 and abs(dy) < 0.34:
                      r, g, b = 39, 209, 127
                  row.extend((r, g, b, a))
              rows.append(bytes(row))

          def chunk(kind, data):
              return struct.pack(">I", len(data)) + kind + data + struct.pack(">I", zlib.crc32(kind + data) & 0xffffffff)

          png = b"\x89PNG\r\n\x1a\n"
          png += chunk(b"IHDR", struct.pack(">IIBBBBB", size, size, 8, 6, 0, 0, 0))
          png += chunk(b"IDAT", zlib.compress(b"".join(rows), 9))
          png += chunk(b"IEND", b"")
          Path("AppIcon-1024.png").write_bytes(png)
          PY
          for spec in \
            "16 icon_16x16.png" \
            "32 icon_16x16@2x.png" \
            "32 icon_32x32.png" \
            "64 icon_32x32@2x.png" \
            "128 icon_128x128.png" \
            "256 icon_128x128@2x.png" \
            "256 icon_256x256.png" \
            "512 icon_256x256@2x.png" \
            "512 icon_512x512.png" \
            "1024 icon_512x512@2x.png"; do
            set -- $spec
            sips -z "$1" "$1" AppIcon-1024.png --out "$ICONSET/$2" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP_DIR/Contents/Resources/AppIcon.icns"
          chmod +x "$APP_DIR/Contents/MacOS/AI Gateway"
          chmod +x "$APP_DIR/Contents/Resources/backend/ai-gateway-backend"
          codesign --force --deep --sign - "$APP_DIR"

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p "package/${{ matrix.artifact_name }}"
          if [ -d "dist/${{ matrix.app_name }}.app" ]; then
            cp -R "dist/${{ matrix.app_name }}.app" "package/${{ matrix.artifact_name }}/"
          else
            cp -R "dist/${{ matrix.app_name }}/." "package/${{ matrix.artifact_name }}/"
          fi
          cp RELEASE.md "package/${{ matrix.artifact_name }}/README.md"
          cp README.zh-CN.md "package/${{ matrix.artifact_name }}/README.zh-CN.md"
          mkdir -p "package/${{ matrix.artifact_name }}/data"

      - name: Archive package
        shell: python
        run: |
          import os
          import stat
          import zipfile
          from pathlib import Path

          root = Path("package") / "${{ matrix.artifact_name }}"
          executable = root / "${{ matrix.executable_path }}"
          if executable.exists() and os.name != "nt":
              executable.chmod(executable.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

          with zipfile.ZipFile("${{ matrix.archive_name }}", "w", zipfile.ZIP_DEFLATED) as archive:
              for path in root.rglob("*"):
                  arcname = path.relative_to("package")
                  if path.is_symlink():
                      info = zipfile.ZipInfo(str(arcname))
                      info.create_system = 3
                      info.external_attr = (stat.S_IFLNK | 0o777) << 16
                      archive.writestr(info, os.readlink(path))
                      continue

                  info = zipfile.ZipInfo.from_file(path, arcname)
                  info.create_system = 3 if os.name != "nt" else 0
                  if os.name != "nt":
                      info.external_attr = (path.stat().st_mode & 0xFFFF) << 16
                  if path.is_dir():
                      archive.writestr(info, "")
                  else:
                      with path.open("rb") as file:
                          archive.writestr(info, file.read())

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
